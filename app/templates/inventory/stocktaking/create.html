{% extends "base.html" %}
{% block title %}Tạo phiếu kiểm kê{% endblock %}
{% block page_title %}<i class="fas fa-clipboard-check me-2"></i>Tạo phiếu kiểm kê{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header">
    <a href="{{ url_for('stocktaking.index') }}" class="btn btn-sm btn-outline-secondary">
      <i class="fas fa-arrow-left me-1"></i>Quay lại
    </a>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Kho kiểm kê <span class="text-danger">*</span></label>
        <select name="warehouse_id" class="form-select" required>
          <option value="">-- Chọn kho --</option>
          {% for wh in warehouses %}
          <option value="{{ wh.id }}">{{ wh.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Ngày kiểm kê</label>
        <input type="date" name="count_date" class="form-control" value="{{ today }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Ghi chú</label>
        <textarea name="note" class="form-control" rows="3" placeholder="Ghi chú về đợt kiểm kê..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-plus me-1"></i>Tạo phiếu
      </button>
    </form>
  </div>
</div>
{% endblock %}
