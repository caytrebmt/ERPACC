<!doctype html>
<html lang="{{ session.get('lang', 'vi') }}">
  <head>
    <meta charset="UTF-8" />
    <style>
      @page {
        size: A4;
        margin: 15mm 12mm 15mm 12mm;
      }
      body {
        font-family: Arial, sans-serif;
        font-size: 13px;
        color: #111;
      }
      .text-center {
        text-align: center;
      }
      .text-end {
        text-align: right;
      }
      .fw-bold {
        font-weight: bold;
      }
      .small {
        font-size: 12px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid #444;
        padding: 6px 5px;
      }
      th {
        background: #ffffff;
      }
      .no-border td,
      .no-border th {
        border: none;
      }
      .sign-row td {
        height: 70px;
        vertical-align: top;
      }
      .title {
        font-size: 16px;
        font-weight: bold;
        text-transform: uppercase;
      }
      .subtitle {
        font-size: 13px;
      }
      .mt-1 {
        margin-top: 4px;
      }
      .mt-2 {
        margin-top: 8px;
      }
      .mt-3 {
        margin-top: 13px;
      }
      .mb-1 {
        margin-bottom: 4px;
      }
      .mb-2 {
        margin-bottom: 8px;
      }
      .mb-3 {
        margin-bottom: 13px;
      }
      .pt-1 {
        padding-top: 4px;
      }
      .pt-2 {
        padding-top: 8px;
      }
      .pb-1 {
        padding-bottom: 4px;
      }
      .pb-2 {
        padding-bottom: 8px;
      }
      .borderless {
        border: none;
      }
      .w-50 {
        width: 50%;
      }
      .w-25 {
        width: 25%;
      }
      .w-15 {
        width: 15%;
      }
      .w-10 {
        width: 10%;
      }
    </style>
  </head>
  <body>
    {% block body %}{% endblock %}
  </body>
</html>
