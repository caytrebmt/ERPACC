<style>
  .erp-print-fragment {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: #111;
    background: #fff;
  }
  .erp-print-fragment .text-center {
    text-align: center;
  }
  .erp-print-fragment .text-end {
    text-align: right;
  }
  .erp-print-fragment .fw-bold {
    font-weight: bold;
  }
  .erp-print-fragment .small {
    font-size: 12px;
  }
  .erp-print-fragment table {
    width: 100%;
    border-collapse: collapse;
  }
  .erp-print-fragment th,
  .erp-print-fragment td {
    border: 1px solid #444;
    padding: 6px 5px;
  }
  .erp-print-fragment th {
    background: #ffffff;
  }
  .erp-print-fragment .no-border td,
  .erp-print-fragment .no-border th {
    border: none;
  }
  .erp-print-fragment .sign-row td {
    height: 70px;
    vertical-align: top;
  }
  .erp-print-fragment .title {
    font-size: 16px;
    font-weight: bold;
    text-transform: uppercase;
  }
  .erp-print-fragment .subtitle {
    font-size: 13px;
  }
  .erp-print-fragment .mt-1 {
    margin-top: 4px;
  }
  .erp-print-fragment .mt-2 {
    margin-top: 8px;
  }
  .erp-print-fragment .mt-3 {
    margin-top: 13px;
  }
  .erp-print-fragment .mb-1 {
    margin-bottom: 4px;
  }
  .erp-print-fragment .mb-2 {
    margin-bottom: 8px;
  }
  .erp-print-fragment .mb-3 {
    margin-bottom: 13px;
  }
  .erp-print-fragment .pt-1 {
    padding-top: 4px;
  }
  .erp-print-fragment .pt-2 {
    padding-top: 8px;
  }
  .erp-print-fragment .pb-1 {
    padding-bottom: 4px;
  }
  .erp-print-fragment .pb-2 {
    padding-bottom: 8px;
  }
  .erp-print-fragment .borderless {
    border: none;
  }
  .erp-print-fragment .w-50 {
    width: 50%;
  }
  .erp-print-fragment .w-25 {
    width: 25%;
  }
  .erp-print-fragment .w-15 {
    width: 15%;
  }
  .erp-print-fragment .w-10 {
    width: 10%;
  }
  .erp-print-fragment .dn-table {
    width: 100%;
    border-collapse: collapse;
  }
  .erp-print-fragment .dn-table th,
  .erp-print-fragment .dn-table td {
    border: 1px solid #ddd;
    padding: 6px 8px;
  }
</style>

<div class="erp-print-fragment">
  {% block body %}{% endblock %}
</div>
