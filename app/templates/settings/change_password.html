{% extends 'base.html' %}
{% block title %}Đổi mật khẩu{% endblock %}
{% block page_title %}Đổi mật khẩu{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-4">
    <div class="card">
      <div class="card-header"><i class="fas fa-key me-1 text-primary"></i> Đổi mật khẩu</div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Mật khẩu hiện tại</label>
            <input type="password" name="old_password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Mật khẩu mới</label>
            <input type="password" name="new_password" class="form-control" required minlength="6">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Nhập lại mật khẩu mới</label>
            <input type="password" name="new_password2" class="form-control" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="fas fa-save me-1"></i> Đổi mật khẩu
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
