<!doctype html>
<html lang="{{ session.get('lang', 'vi') }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập | ERP-VIET</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/bootstrap.min.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/all.min.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/auth.css') }}"
  </head>
  <body>
    <div class="login-card">
      <div class="login-header">
        <i class="fas fa-chart-network" style="font-size: 40px"></i>
        <h4>ERP-VIET</h4>
        <p class="mb-0 opacity-75 small">Quản trị doanh nghiệp</p>
      </div>
      <div class="login-body">
        <form method="POST" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

          <!-- Trường Tên đăng nhập -->
          <div class="mb-4">
            <div class="input-group floating-group">
              <span class="input-group-text"
                ><i class="fas fa-user text-muted"></i
              ></span>
              <input
                type="text"
                name="username"
                class="form-control"
                placeholder=" "
                required
                autofocus
              />
              <label>Tên đăng nhập</label>
              <div class="invalid-feedback">Vui lòng nhập tên đăng nhập</div>
            </div>
          </div>

          <!-- Trường Mật khẩu -->
          <div class="mb-4">
            <div class="input-group floating-group">
              <span class="input-group-text"
                ><i class="fas fa-lock text-muted"></i
              ></span>
              <input
                type="password"
                name="password"
                class="form-control"
                placeholder=" "
                required
              />
              <label>Mật khẩu</label>
              <div class="invalid-feedback">Vui lòng nhập mật khẩu</div>
            </div>
          </div>

          <div>
            {% with messages = get_flashed_messages(with_categories=true) %} {%
            for category, message in messages %}
            <div
              class="alert alert-{{ 'success' if category=='success' else 'danger' if category=='danger' else 'warning' }}"
            >
              {{ message }}
            </div>
            {% endfor %} {% endwith %}
          </div>
          <div class="mb-4 form-check">
            <input
              type="checkbox"
              name="remember"
              class="form-check-input"
              id="remember"
            />
            <label class="form-check-label" for="remember"
              >Ghi nhớ đăng nhập</label
            >
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-login w-100 text-white"
          >
            <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
          </button>
        </form>
        <p class="text-center text-muted mt-3 mb-0 small">
          <i class="fas fa-shield-alt me-1"></i>©tranquocviet-2026
        </p>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.js') }}"></script>
    <script id="f3l8w2">
      (() => {
        "use strict";
        const forms = document.querySelectorAll("form");

        Array.from(forms).forEach((form) => {
          form.addEventListener(
            "submit",
            (event) => {
              if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
              }
              form.classList.add("was-validated");
            },
            false,
          );
        });
      })();
    </script>
  </body>
</html>
