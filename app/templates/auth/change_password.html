{% extends "base.html" %} {% block title %}Đổi mật khẩu{% endblock %} {% block
page_title %}<i class="fas fa-key me-2"></i>Đổi mật khẩu{% endblock %} {% block
content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-header">Đổi mật khẩu tài khoản</div>
      <form method="POST">
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">Mật khẩu cũ</label>
            <input
              type="password"
              name="old_password"
              class="form-control"
              required
              oninvalid="this.setCustomValidity('Vui lòng nhập mật khẩu cũ')"
              oninput="this.setCustomValidity('')"
            />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Mật khẩu mới</label>
            <input
              type="password"
              name="new_password"
              class="form-control"
              required
              minlength="6"
              oninvalid="this.setCustomValidity('Mật khẩu mới phải có ít nhất 6 ký tự')
              oninput="this.setCustomValidity('')"
            />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Xác nhận mật khẩu mới</label>
            <input
              type="password"
              name="confirm_password"
              class="form-control"
              required
              minlength="6"
            />
          </div>
        </div>
        <div class="card-footer d-flex justify-content-between">
          <a
            href="{{ url_for('dashboard.index') }}"
            class="btn btn-outline-secondary"
            >Quay lại</a
          >
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save me-1"></i>Lưu mật khẩu
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
